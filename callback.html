<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization - VideoMate</title>
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 90%;
        }
        .check-icon {
            width: 64px;
            height: 64px;
            background: #00C853;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .check-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        h2 {
            font-size: 22px;
            color: #111;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .code-box {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #333;
            word-break: break-all;
            margin-bottom: 16px;
            text-align: left;
            min-height: 40px;
        }
        .error-box {
            background: #FFF3F3;
            border: 1px solid #FFCDD2;
            color: #D32F2F;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="check-icon">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h2>Authorization Complete</h2>
        <p>You have successfully authorized the VideoMate app.</p>
        
        <div id="codeDisplay" class="code-box">Processing authorization...</div>
        <div id="errorDisplay" class="error-box" style="display:none;"></div>
        
        <p style="font-size:12px;color:#aaa;">You may close this window now.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const authCode = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        const codeDisplay = document.getElementById('codeDisplay');
        const errorDisplay = document.getElementById('errorDisplay');

        if (authCode) {
            codeDisplay.textContent = 'Authorization Code: ' + authCode;
            
            // Redirect to dashboard after 1 second
            setTimeout(function() {
                window.location.href = '/dashboard';
            }, 1000);
        } else if (error) {
            errorDisplay.style.display = 'block';
            errorDisplay.textContent = `Error: ${error} - ${errorDescription || 'No description provided'}`;
            codeDisplay.textContent = 'Authorization failed. Please try again.';
        } else {
            codeDisplay.textContent = 'No authorization code found in URL. Please try logging in again.';
        }
    </script>

</body>
</html>
